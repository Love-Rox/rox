name: CI

on:
  push:
    branches-ignore:
      - 'dependabot/**'
  pull_request:
    branches: [main, dev]
  workflow_call:

# Default permissions: read-only. Each job opts in to more when needed.
permissions:
  contents: read

env:
  # Default environment for tests (no real DB needed for unit tests)
  DB_TYPE: postgres
  DATABASE_URL: postgresql://test:test@localhost:5432/test
  STORAGE_TYPE: local
  LOCAL_STORAGE_PATH: ./uploads
  URL: http://localhost:3000
  NODE_ENV: test
  # Pinned tool versions. Bump explicitly; do not use "latest".
  BUN_VERSION: "1.3.14"

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    # Only meaningful on PRs (compares base..head).
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - name: Review dependencies
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint
        continue-on-error: true

      - name: Type check backend
        run: bun run typecheck
        working-directory: packages/backend

      - name: Type check frontend
        run: bun run typecheck
        working-directory: packages/frontend
        continue-on-error: true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun test src/tests/unit/
        working-directory: packages/backend
        env:
          DB_TYPE: postgres
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          STORAGE_TYPE: local
          LOCAL_STORAGE_PATH: ./uploads
          URL: http://localhost:3000

  sqlite-tests:
    name: SQLite Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node.js (for native module compatibility)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: "24"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run SQLite integration tests
        run: bunx vitest run src/tests/node/sqlite-repositories.test.ts
        working-directory: packages/backend
        env:
          DB_TYPE: sqlite
          STORAGE_TYPE: local
          LOCAL_STORAGE_PATH: ./uploads
          URL: http://localhost:3000

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests, sqlite-tests]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build backend
        run: bun run build
        working-directory: packages/backend

      - name: Build frontend
        run: bun run build
        working-directory: packages/frontend
        continue-on-error: true
# NOTE: Integration and E2E tests require a running server.
# These tests should be run manually or in a dedicated staging environment.
# To run locally:
#   1. Start the server: bun run dev
#   2. Run integration tests: bun test src/tests/integration/
#   3. Run E2E tests: bun test src/tests/e2e/
