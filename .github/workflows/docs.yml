# GitHub Actions workflow to generate and deploy TypeDoc documentation to GitHub Pages
#
# This workflow:
# 1. Generates API documentation using TypeDoc
# 2. Deploys to GitHub Pages on pushes to main branch
#
# Setup required:
# 1. Go to repository Settings > Pages
# 2. Set "Source" to "GitHub Actions"
# 3. The docs will be available at https://<username>.github.io/<repo>/

name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'packages/backend/src/**'
      - 'packages/frontend/src/**'
      - 'packages/shared/src/**'
      - 'typedoc.json'
      - 'tsconfig.typedoc.json'
      - '.github/workflows/docs.yml'
      - 'README.md'
  workflow_dispatch:  # Allow manual trigger

env:
  # Pinned tool versions. Bump explicitly; do not use "latest".
  BUN_VERSION: "1.3.14"

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate TypeDoc documentation
        run: npx typedoc

      - name: Setup Pages
        uses: actions/configure-pages@1f0c5cde4bc74cd7e1254d0cb4de8d49e9068c7d # v4.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./docs/api

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-docs

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
